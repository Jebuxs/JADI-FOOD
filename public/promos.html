<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones - JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white p-4 shadow-sm flex items-center justify-between">
        <button onclick="window.location.href='admin.html'" class="text-gray-400"><i class="fa-solid fa-chevron-left text-xl"></i></button>
        <h1 class="text-sm font-black uppercase tracking-widest text-purple-600">Marketing & Promos</h1>
        <div class="w-6"></div>
    </nav>

    <div class="p-6 max-w-md mx-auto">
        <div class="bg-purple-600 p-6 rounded-[2.5rem] shadow-xl text-white mb-8">
            <h2 class="text-xs font-bold uppercase opacity-80 mb-4 tracking-widest">Crear Nueva Oferta</h2>
            <div class="space-y-3">
                <input type="text" id="nombre-promo" placeholder="Nombre (Ej: Combo Parejas)" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl outline-none placeholder:text-white/50 font-bold">
                <div class="flex gap-2">
                    <input type="text" id="codigo-promo" placeholder="CÓDIGO (Ej: JADI20)" class="w-1/2 p-4 bg-white/10 border border-white/20 rounded-2xl outline-none placeholder:text-white/50 font-mono uppercase">
                    <input type="number" id="dcto-promo" placeholder="Desc %" class="w-1/2 p-4 bg-white/10 border border-white/20 rounded-2xl outline-none placeholder:text-white/50 font-black">
                </div>
                <button onclick="guardarPromo()" id="btn-promo" class="w-full bg-white text-purple-600 p-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">
                    LANZAR PROMOCIÓN 🚀
                </button>
            </div>
        </div>

        <h3 class="font-black text-gray-400 text-xs uppercase mb-4 tracking-widest">Promociones Vigentes</h3>
        <div id="lista-promos" class="space-y-3">
            </div>
    </div>

    <script type="module">
        import { db } from "../config/firebase-config.js";
        import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const promoRef = collection(db, "promociones");

        window.guardarPromo = async () => {
            const nom = document.getElementById('nombre-promo').value;
            const cod = document.getElementById('codigo-promo').value;
            const dct = document.getElementById('dcto-promo').value;

            if(!nom || !dct) return alert("Faltan datos");

            try {
                await addDoc(promoRef, { nombre: nom, codigo: cod, descuento: dct, activa: true });
                location.reload();
            } catch (e) { alert("Error"); }
        };

        async function cargarPromos() {
            const snap = await getDocs(promoRef);
            const lista = document.getElementById('lista-promos');
            snap.forEach(d => {
                const pr = d.data();
                lista.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-purple-500 relative">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-black text-gray-800 uppercase text-sm">${pr.nombre}</h4>
                                <p class="text-[10px] font-bold text-purple-600 mt-1">CÓDIGO: <span class="bg-purple-50 px-2 py-0.5 rounded border border-purple-100">${pr.codigo || 'AUTO'}</span></p>
                            </div>
                            <div class="text-right">
                                <span class="text-2xl font-black text-gray-900">-${pr.descuento}%</span>
                            </div>
                        </div>
                        <button onclick="borrarPromo('${d.id}')" class="absolute -top-2 -right-2 bg-gray-100 text-gray-400 w-8 h-8 rounded-full shadow-sm hover:text-red-500 transition-all"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `;
            });
        }
        window.borrarPromo = async (id) => { if(confirm("¿Quitar promoción?")) { await deleteDoc(doc(db, "promociones", id)); location.reload(); } };
        cargarPromos();
    </script>
</body>
</html>
