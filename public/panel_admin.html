<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Admin - JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen font-sans text-slate-200">

    <header class="p-6 bg-slate-800 border-b border-slate-700 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-orange-500 italic">JADI-FOOD <span class="text-white text-sm not-italic font-medium opacity-50 uppercase ml-2">App Owner</span></h1>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-slate-700 p-3 rounded-2xl hover:bg-red-500 transition-all">
                <i class="fa-solid fa-power-off text-white"></i>
            </button>
        </div>
    </header>

    <main class="p-6 max-w-6xl mx-auto">
        
        <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-6">Módulos del Ecosistema</h3>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-12">
            
            <button onclick="location.href='index.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-door-open text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Index</span>
            </button>

            <button onclick="location.href='admin.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-user-tie text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Admin Local</span>
            </button>

            <button onclick="location.href='ventas.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-cash-register text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Ventas</span>
            </button>

            <button onclick="location.href='menu.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-utensils text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Menú</span>
            </button>

            <button onclick="location.href='facturas.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-file-invoice-dollar text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Facturas</span>
            </button>

            <button onclick="location.href='promos.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-tags text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Promos</span>
            </button>

            <button onclick="location.href='pagos.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-qrcode text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Pagos</span>
            </button>

            <button onclick="location.href='ubicacion.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-location-dot text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Ubicación</span>
            </button>

            <button onclick="location.href='registro.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-user-plus text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Registro</span>
            </button>

            <button onclick="location.href='cliente.html'" class="flex flex-col items-center p-4 bg-slate-800 rounded-[2rem] border border-slate-700 hover:border-orange-500 transition-all group">
                <i class="fa-solid fa-receipt text-2xl mb-2 text-slate-500 group-hover:text-orange-500"></i>
                <span class="text-[10px] font-bold uppercase">Vista Cliente</span>
            </button>
        </div>

        <div class="bg-orange-600 rounded-[2.5rem] p-8 mb-8 flex justify-between items-center shadow-lg">
            <div>
                <p class="text-orange-200 font-bold text-xs uppercase tracking-widest">Total Pedidos en la App</p>
                <h2 id="conteo-pedidos" class="text-6xl font-black text-white italic">0</h2>
            </div>
            <i class="fa-solid fa-chart-line text-5xl text-white opacity-30"></i>
        </div>

        <div class="bg-slate-800 rounded-[2.5rem] p-8 border border-slate-700 shadow-xl overflow-hidden">
            <h3 class="font-black text-xl mb-6">Detalle de Ventas Globales</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-500 border-b border-slate-700">
                            <th class="pb-4 font-bold uppercase text-[10px]">Nombre</th>
                            <th class="pb-4 font-bold uppercase text-[10px]">N. Celular</th>
                            <th class="pb-4 font-bold uppercase text-[10px]">Cant.</th>
                            <th class="pb-4 font-bold uppercase text-[10px]">Detalle</th>
                            <th class="pb-4 font-bold uppercase text-[10px]">Ubicación</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-pedidos">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from "../config/firebase-config.js";
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Escuchar cambios en tiempo real
        const q = query(collection(db, "pedidos"), orderBy("fecha", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const tabla = document.getElementById('tabla-pedidos');
            const contador = document.getElementById('conteo-pedidos');
            
            tabla.innerHTML = "";
            contador.innerText = snapshot.size;

            snapshot.forEach((doc) => {
                const p = doc.data();
                tabla.innerHTML += `
                    <tr class="border-b border-slate-700/50 h-16 hover:bg-slate-700/30 transition-all">
                        <td class="font-bold text-white">${p.cliente || 'Anónimo'}</td>
                        <td class="text-orange-400 font-mono">${p.telefono || 'Sin Tel.'}</td>
                        <td class="font-black">${p.cantidad || '1'}</td>
                        <td class="text-slate-400 italic">${p.detalle || 'Consumo Local'}</td>
                        <td>
                            <span class="bg-slate-700 px-3 py-1 rounded-full text-[10px] font-bold">
                                <i class="fa-solid fa-location-dot mr-1 text-red-500"></i> ${p.local || 'Matriz'}
                            </span>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
