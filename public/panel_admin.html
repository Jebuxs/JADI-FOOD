<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Panel Dueño App | JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-black">CONTROL GLOBAL JADI-FOOD</h1>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">Salir</button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-500">
            <p class="text-gray-400 font-bold text-xs">LOCALES ACTIVOS</p>
            <h2 id="total-locales" class="text-4xl font-black">0</h2>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-green-500">
            <p class="text-gray-400 font-bold text-xs">VENTAS TOTALES APP</p>
            <h2 class="text-4xl font-black">$0.00</h2>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm">
        <h3 class="font-bold mb-4">Gestión de Locales y Suscripciones</h3>
        <table class="w-full text-left">
            <thead><tr class="text-gray-400 border-b"><th>Local</th><th>Dueño</th><th>Estado</th><th>Acción</th></tr></thead>
            <tbody id="lista-locales"></tbody>
        </table>
    </div>

    <script type="module">
        import { auth, db } from "../config/firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function cargarLocales() {
            const querySnapshot = await getDocs(collection(db, "locales"));
            const lista = document.getElementById('lista-locales');
            lista.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                lista.innerHTML += `<tr class="border-b h-12">
                    <td>${data.nombre}</td><td>${data.dueno}</td>
                    <td><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Activo</span></td>
                    <td><button class="text-blue-600 font-bold">Ver Detalles</button></td>
                </tr>`;
            });
        }
        cargarLocales();
    </script>
</body>
</html>
