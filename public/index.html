<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-main { 
            background-image: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-position: center; 
        }
        /* Tarjeta flotante con desenfoque de fondo */
        .glass-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 md:p-10 bg-main font-sans">

    <div class="flex flex-col md:flex-row w-full max-w-7xl gap-8 items-center">
        
        <div class="w-full md:w-2/3 text-center md:text-left space-y-6">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter text-orange-500 drop-shadow-2xl">JADI-FOOD</h1>
            <p class="text-xl md:text-3xl font-bold text-white uppercase tracking-[0.2em] opacity-90">El sabor que te mueve.</p>
            
            <div class="flex flex-wrap gap-4 justify-center md:justify-start pt-6">
                <div class="bg-orange-600 p-6 rounded-3xl shadow-xl">
                    <p class="text-[10px] font-black uppercase text-orange-200">Promo</p>
                    <h4 class="text-2xl font-black italic text-white">2x1 COMBOS</h4>
                </div>
                <div class="bg-blue-600 p-6 rounded-3xl shadow-xl">
                    <p class="text-[10px] font-black uppercase text-blue-200">Digital</p>
                    <h4 class="text-2xl font-black italic text-white">PAGA CON QR</h4>
                </div>
            </div>
        </div>

        <div class="w-full md:w-[400px] glass-card p-8 md:p-10 rounded-[2.5rem] shadow-2xl">
            <div class="mb-8">
                <h2 class="text-4xl font-black text-white uppercase leading-none italic">HOLA,</h2>
                <p class="text-slate-400 font-bold tracking-widest uppercase italic mt-1 text-[10px]">Ingresa al Panel</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Email</label>
                    <input type="email" id="email" placeholder="tu@correo.com" class="w-full mt-1 p-4 bg-slate-900/50 border border-slate-700 rounded-2xl outline-none focus:border-orange-500 text-white font-bold transition-all">
                </div>

                <div class="relative">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Clave</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full mt-1 p-4 bg-slate-900/50 border border-slate-700 rounded-2xl outline-none focus:border-orange-500 text-white font-bold transition-all">
                    <button type="button" id="btn-toggle" class="absolute right-4 top-10 text-slate-600 hover:text-orange-500">
                        <i class="fa-solid fa-eye text-lg"></i>
                    </button>
                </div>

                <button id="btn-login-manual" class="w-full bg-orange-600 text-white p-4 rounded-2xl font-black text-lg shadow-xl hover:bg-orange-500 active:scale-95 transition-all uppercase italic">
                    Iniciar Sesión
                </button>

                <div class="relative py-2 text-center">
                    <span class="bg-slate-800 px-4 text-[10px] text-slate-500 font-black uppercase tracking-widest relative z-10">O entra con</span>
                    <div class="absolute top-1/2 left-0 w-full border-t border-slate-700/50"></div>
                </div>

                <button id="btn-google" class="flex items-center justify-center w-full bg-white p-4 rounded-2xl font-black text-slate-900 hover:bg-slate-100 active:scale-95 transition-all shadow-xl">
                    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-5 mr-3"> 
                    GMAIL
                </button>
            </div>

            <div class="mt-8 text-center border-t border-slate-700/50 pt-6">
                <a href="registro.html" class="text-orange-500 font-black text-lg hover:underline decoration-2 underline-offset-4 uppercase tracking-tighter">
                    ¡REGISTRARME AQUÍ!
                </a>
            </div>
        </div>

    </div>

    <script type="module">
        // RUTA CORRECTA PARA CONFIG FUERA DE PUBLIC
        import { auth, provider, db } from "../config/firebase-config.js"; 
        import { signInWithPopup, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const redirigir = async (user) => {
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            if (docSnap.exists()) {
                const rol = docSnap.data().rol;
                if (rol === "super_admin") window.location.href = "panel_admin.html";
                else if (rol === "admin_local") window.location.href = "admin.html";
                else window.location.href = "ventas.html";
            } else { window.location.href = "registro.html"; }
        };

        onAuthStateChanged(auth, (user) => { if (user) redirigir(user); });

        // ASIGNACIÓN DE EVENTOS (Esto hace que los botones funcionen sí o sí)
        document.addEventListener('DOMContentLoaded', () => {
            
            document.getElementById('btn-google').onclick = async () => {
                try {
                    const res = await signInWithPopup(auth, provider);
                    redirigir(res.user);
                } catch (e) { alert("Error con Google"); }
            };

            document.getElementById('btn-login-manual').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                if (!email || !pass) return alert("Llena los campos, bro.");
                try {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    redirigir(res.user);
                } catch (e) { alert("Datos incorrectos"); }
            };

            document.getElementById('btn-toggle').onclick = () => {
                const p = document.getElementById('password');
                p.type = p.type === 'password' ? 'text' : 'password';
            };
        });
    </script>
</body>
</html>
