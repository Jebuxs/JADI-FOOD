<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-main { 
            background-image: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-position: center; 
        }
        /* El rectángulo flotante estético */
        .glass-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 md:p-10 bg-main font-sans">

    <div class="flex flex-col md:flex-row w-full max-w-6xl gap-10 items-center justify-between">
        
        <div class="w-full md:w-1/2 text-center md:text-left">
            <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter text-orange-500 drop-shadow-2xl mb-4">JADI-FOOD</h1>
            <p class="text-xl md:text-2xl font-bold text-white uppercase tracking-widest opacity-90 mb-8">Sabores que conectan.</p>
            
            <div class="hidden md:flex gap-4">
                <div class="bg-orange-600 p-6 rounded-[2rem] shadow-lg">
                    <h4 class="text-2xl font-black italic text-white uppercase">2x1 Combos</h4>
                </div>
                <div class="bg-blue-600 p-6 rounded-[2rem] shadow-lg">
                    <h4 class="text-2xl font-black italic text-white uppercase">Paga con QR</h4>
                </div>
            </div>
        </div>

        <div class="w-full max-w-[420px] glass-card p-8 md:p-12 rounded-[3rem] transition-all">
            <div class="mb-10 text-center md:text-left">
                <h2 class="text-5xl font-black text-white uppercase italic leading-none">HOLA,</h2>
                <p class="text-slate-400 font-bold tracking-widest uppercase italic mt-2 text-[11px]">Panel de Control</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-3">Email de Usuario</label>
                    <input type="email" id="email" placeholder="nombre@jadi.com" class="w-full mt-1 p-5 bg-slate-900/60 border border-slate-700 rounded-3xl outline-none focus:border-orange-500 text-white font-bold transition-all">
                </div>

                <div class="relative">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-3">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full mt-1 p-5 bg-slate-900/60 border border-slate-700 rounded-3xl outline-none focus:border-orange-500 text-white font-bold transition-all">
                    <button type="button" id="btn-toggle" class="absolute right-5 top-[46px] text-slate-500 hover:text-orange-500">
                        <i class="fa-solid fa-eye text-xl"></i>
                    </button>
                </div>

                <button id="btn-login-manual" class="w-full bg-orange-600 text-white p-5 rounded-3xl font-black text-xl shadow-xl hover:bg-orange-500 active:scale-95 transition-all uppercase italic">
                    Iniciar Sesión
                </button>

                <div class="relative py-2 text-center">
                    <span class="bg-transparent px-4 text-[10px] text-slate-500 font-black uppercase tracking-widest relative z-10">O conéctate con</span>
                    <div class="absolute top-1/2 left-0 w-full border-t border-slate-700/50"></div>
                </div>

                <button id="btn-google" class="flex items-center justify-center w-full bg-white p-5 rounded-3xl font-black text-slate-900 hover:bg-slate-100 active:scale-95 transition-all shadow-xl">
                    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-6 mr-4"> 
                    GMAIL
                </button>
            </div>

            <div class="mt-10 text-center border-t border-slate-700/50 pt-8">
                <a href="registro.html" class="text-orange-500 font-black text-xl hover:underline decoration-2 underline-offset-8 uppercase tracking-tighter transition-all">
                    ¡Registrarme Ahora!
                </a>
            </div>
        </div>

    </div>

    <script type="module">
        // USAMOS LA RUTA SEGÚN TU ESTRUCTURA DE GITHUB
        import { auth, provider, db } from "../config/firebase-config.js"; 
        import { signInWithPopup, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const redirigir = async (user) => {
            try {
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (docSnap.exists()) {
                    const rol = docSnap.data().rol;
                    if (rol === "super_admin") window.location.href = "panel_admin.html";
                    else if (rol === "admin_local") window.location.href = "admin.html";
                    else window.location.href = "ventas.html";
                } else { window.location.href = "registro.html"; }
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (user) => { if (user) redirigir(user); });

        // ACTIVACIÓN DE BOTONES (Solución al fallo de funcionalidad)
        document.addEventListener('DOMContentLoaded', () => {
            
            document.getElementById('btn-google').onclick = async () => {
                try {
                    const res = await signInWithPopup(auth, provider);
                    redirigir(res.user);
                } catch (e) { alert("Error al conectar con Google"); }
            };

            document.getElementById('btn-login-manual').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                if (!email || !pass) return alert("Por favor, llena los campos.");
                try {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    redirigir(res.user);
                } catch (e) { alert("Credenciales incorrectas"); }
            };

            document.getElementById('btn-toggle').onclick = () => {
                const p = document.getElementById('password');
                const i = document.querySelector('#btn-toggle i');
                if (p.type === 'password') {
                    p.type = 'text';
                    i.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    p.type = 'password';
                    i.classList.replace('fa-eye-slash', 'fa-eye');
                }
            };
        });
    </script>
</body>
</html>
