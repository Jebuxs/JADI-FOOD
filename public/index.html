<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-promo { 
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center; 
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col md:flex-row overflow-x-hidden text-slate-100">

    <div class="hidden md:flex md:w-2/3 p-16 flex-col justify-between relative bg-promo">
        <div class="relative z-10">
            <h1 class="text-8xl font-black italic tracking-tighter text-orange-500">JADI-FOOD</h1>
            <p class="text-2xl font-bold text-white uppercase tracking-[0.3em] mt-4 opacity-80">Sabores que conectan, tecnología que vende.</p>
        </div>

        <div class="relative z-10 grid grid-cols-2 gap-8">
            <div class="bg-orange-600 p-10 rounded-[3rem] shadow-2xl border border-white/10">
                <p class="text-xs font-black uppercase tracking-widest text-orange-200 mb-2">Oferta de Hoy</p>
                <h4 class="text-4xl font-black italic">2x1 COMBOS JADI</h4>
            </div>
            <div class="bg-blue-600 p-10 rounded-[3rem] shadow-2xl border border-white/10">
                <p class="text-xs font-black uppercase tracking-widest text-blue-200 mb-2">Club Beneficios</p>
                <h4 class="text-4xl font-black italic">PAGA CON QR</h4>
            </div>
        </div>
    </div>

    <div class="w-full md:w-1/3 bg-slate-800 p-12 flex flex-col justify-center border-l border-slate-700 shadow-2xl">
        <div class="mb-12">
            <h2 class="text-6xl font-black text-white uppercase leading-none">HOLA,</h2>
            <p class="text-slate-500 font-bold tracking-[0.2em] uppercase italic mt-2">Gestiona tu negocio</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Usuario / Email</label>
                <input type="email" id="email" placeholder="nombre@jadi.com" 
                    class="w-full mt-2 p-5 bg-slate-900 border-2 border-transparent rounded-3xl outline-none focus:border-orange-500 text-white font-bold transition-all">
            </div>

            <div class="relative">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" 
                    class="w-full mt-2 p-5 bg-slate-900 border-2 border-transparent rounded-3xl outline-none focus:border-orange-500 text-white font-bold transition-all">
                <button type="button" id="btn-toggle" class="absolute right-6 top-12 text-slate-500 hover:text-orange-500">
                    <i class="fa-solid fa-eye text-xl"></i>
                </button>
            </div>

            <button id="btn-login-manual" class="w-full bg-orange-600 text-white p-5 rounded-3xl font-black text-xl hover:bg-orange-500 active:scale-95 transition-all uppercase italic shadow-lg">
                Iniciar Sesión
            </button>

            <div class="relative py-4 text-center">
                <span class="bg-slate-800 px-6 text-[10px] text-slate-500 font-black uppercase tracking-[0.4em] relative z-10">O conéctate</span>
                <div class="absolute top-1/2 left-0 w-full border-t border-slate-700/50"></div>
            </div>

            <button id="btn-google" class="flex items-center justify-center w-full bg-white p-5 rounded-3xl font-black text-slate-900 hover:bg-slate-100 active:scale-95 transition-all shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pms/google.png" class="w-6 mr-4"> 
                INGRESAR CON GMAIL
            </button>
        </div>

        <div class="mt-16 text-center">
            <p class="text-sm text-slate-500 font-bold uppercase tracking-widest">¿Eres nuevo aquí?</p>
            <a href="registro.html" class="block mt-2 text-orange-500 font-black text-2xl hover:underline decoration-4 underline-offset-8 transition-all">
                ¡REGISTRARME AQUÍ!
            </a>
        </div>
    </div>

    <script type="module">
        // IMPORTANTE: Asegúrate de que la ruta a tu archivo config sea la correcta
        import { auth, provider, db } from "../config/firebase-config.js"; 
        import { signInWithPopup, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Función Maestra de Redirección
        const verificarRolYRedirigir = async (user) => {
            try {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const rol = userDoc.data().rol;
                    if (rol === "super_admin") window.location.href = "panel_admin.html";
                    else if (rol === "admin_local") window.location.href = "admin.html";
                    else window.location.href = "ventas.html";
                } else {
                    // Si no tiene documento de perfil, es un registro incompleto
                    window.location.href = "registro.html";
                }
            } catch (error) {
                console.error("Error consultando rol:", error);
            }
        };

        // El Guardián: Detecta si ya hay una sesión activa al entrar
        onAuthStateChanged(auth, (user) => {
            if (user) {
                verificarRolYRedirigir(user);
            }
        });

        // ASIGNACIÓN DE EVENTOS (Soluciona el fallo de los botones)
        document.addEventListener('DOMContentLoaded', () => {
            
            // Botón Google
            document.getElementById('btn-google').onclick = async () => {
                try {
                    const res = await signInWithPopup(auth, provider);
                    verificarRolYRedirigir(res.user);
                } catch (e) {
                    alert("Error al conectar con Google: " + e.message);
                }
            };

            // Botón Email
            document.getElementById('btn-login-manual').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                const btn = document.getElementById('btn-login-manual');

                if (!email || !pass) return alert("Por favor, llena todos los campos.");

                btn.innerText = "VERIFICANDO...";
                btn.disabled = true;

                try {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    verificarRolYRedirigir(res.user);
                } catch (e) {
                    alert("Credenciales incorrectas.");
                    btn.innerText = "INICIAR SESIÓN";
                    btn.disabled = false;
                }
            };

            // Ojito de Pollo
            document.getElementById('btn-toggle').onclick = () => {
                const p = document.getElementById('password');
                const i = document.getElementById('btn-toggle').querySelector('i');
                if (p.type === "password") {
                    p.type = "text";
                    i.classList.replace("fa-eye", "fa-eye-slash");
                } else {
                    p.type = "password";
                    i.classList.replace("fa-eye-slash", "fa-eye");
                }
            };
        });
    </script>
</body>
</html>
