<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md mb-6 overflow-hidden rounded-2xl shadow-lg bg-orange-500 relative">
        <div class="p-6 text-white">
            <h3 class="font-black text-xl italic uppercase">JADI-FOOD</h3>
            <p class="text-sm opacity-90">"El sabor que te mueve, ahora digital."</p>
            <div class="mt-4 bg-white/20 p-3 rounded-lg text-xs border border-white/30">
                🚀 **PROMO:** ¡Vende 100 platos y gana un bono JADI!
            </div>
        </div>
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-orange-400 rounded-full opacity-50"></div>
    </div>

    <div id="login-card" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-800 tracking-tighter">INICIAR SESIÓN</h1>
            <p id="local-info" class="text-orange-600 text-[10px] font-bold uppercase mt-1 tracking-widest">Cargando Sucursal...</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Usuario</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="email" placeholder="usuario@jadi.com" 
                        class="w-full pl-10 p-4 bg-gray-50 border-2 border-gray-100 focus:border-orange-500 rounded-2xl outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Clave</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" 
                        class="w-full pl-10 pr-12 p-4 bg-gray-50 border-2 border-gray-100 focus:border-orange-500 rounded-2xl outline-none transition-all">
                    <button onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-orange-500">
                        <i id="eye-icon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button onclick="loginEmail()" class="w-full bg-gray-900 text-white p-4 rounded-2xl font-black text-lg shadow-lg hover:bg-black active:scale-95 transition-all mt-2">
                INGRESAR
            </button>
        </div>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400 font-bold">O accede con</span></div>
        </div>

        <button onclick="loginGoogle()" class="flex items-center justify-center w-full border-2 border-gray-100 p-4 rounded-2xl font-bold text-gray-700 hover:bg-gray-50 transition-all active:scale-95 shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pms/google.png" class="w-6 mr-3">
            Gmail
        </button>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">¿No tienes cuenta? <a href="#" class="text-orange-600 font-bold hover:underline">Registrarse</a></p>
        </div>
    </div>

    <script type="module">
        import { db, auth, provider } from "./firebase-config.js";
        import { signInWithPopup, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Detectar sucursal del link
        const params = new URLSearchParams(window.location.search);
        const local = params.get('local') || "Sede Central";
        document.getElementById('local-info').innerText = `Sucursal: ${local}`;

        // Lógica del Ojito de Pollo
        window.togglePassword = () => {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passInput.type = "password";
                eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
            }
        };

        // Login con Google
        window.loginGoogle = () => {
            signInWithPopup(auth, provider)
                .then(() => alert("¡Bienvenido! Redirigiendo..."))
                .catch(err => alert("Error Google: " + err.message));
        };

        // Login con Email/Clave
        window.loginEmail = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Llena tus credenciales");
            
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => alert("Ingreso exitoso"))
                .catch(err => alert("Error de acceso: " + err.message));
        };
    </script>
</body>
</html>
