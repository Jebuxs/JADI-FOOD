<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-gray-50">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tighter italic text-orange-600">JADI-FOOD</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-2">Crea tu cuenta de trabajo</p>
        </div>

        <button onclick="registroGoogle()" class="flex items-center justify-center w-full border-2 border-gray-100 p-4 rounded-2xl font-bold text-gray-700 hover:bg-gray-50 transition-all active:scale-[0.98] mb-6 shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pms/google.png" class="w-5 mr-3">
            Registrarme con Google
        </button>

        <div class="relative my-6 text-center">
            <span class="bg-white px-4 text-[10px] text-gray-300 font-bold uppercase tracking-widest relative z-10">O usa tu correo</span>
            <div class="absolute top-1/2 left-0 w-full border-t border-gray-100"></div>
        </div>

        <div class="space-y-4">
            <input type="text" id="nombre" placeholder="Nombre Completo" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 font-medium border-transparent border-2">
            <input type="email" id="email" placeholder="Correo Electrónico" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 font-medium border-transparent border-2">
            <input type="password" id="pass" placeholder="Contraseña Segura" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 font-medium border-transparent border-2">
            
            <button onclick="registroManual()" id="btn-reg" class="w-full bg-gray-900 text-white p-4 rounded-2xl font-black text-lg shadow-xl hover:bg-black active:scale-[0.98] transition-all uppercase">
                CREAR CUENTA
            </button>
        </div>

        <p class="mt-8 text-center text-sm text-gray-500">
            ¿Ya tienes cuenta? <a href="index.html" class="text-orange-600 font-black hover:underline">ENTRAR AQUÍ</a>
        </p>
    </div>

    <script type="module">
        import { auth, db, provider } from "../config/firebase-config.js";
        import { createUserWithEmailAndPassword, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // FUNCIÓN PARA GUARDAR EL PERFIL EN FIRESTORE
        async function guardarPerfilUsuario(user, nombreInput = null) {
            const userRef = doc(db, "usuarios", user.uid);
            const docSnap = await getDoc(userRef);

            if (!docSnap.exists()) {
                await setDoc(userRef, {
                    nombre: nombreInput || user.displayName || "Usuario Jadi",
                    email: user.email,
                    rol: "vendedor", // Rol por defecto
                    fechaRegistro: new Date()
                });
                alert("¡Cuenta creada con éxito! Bienvenido al equipo.");
            }
            window.location.href = "ventas.html";
        }

        // REGISTRO CON GOOGLE
        window.registroGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                await guardarPerfilUsuario(result.user);
            } catch (error) {
                console.error(error);
                alert("Error al conectar con Google: " + error.message);
            }
        };

        // REGISTRO MANUAL
        window.registroManual = async () => {
            const nom = document.getElementById('nombre').value;
            const em = document.getElementById('email').value;
            const ps = document.getElementById('pass').value;
            const btn = document.getElementById('btn-reg');

            if(!nom || !em || !ps) return alert("Completa todos los campos, bro.");

            btn.innerText = "CREANDO...";
            try {
                const res = await createUserWithEmailAndPassword(auth, em, ps);
                await guardarPerfilUsuario(res.user, nom);
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerText = "CREAR CUENTA";
            }
        };
    </script>
</body>
</html>
