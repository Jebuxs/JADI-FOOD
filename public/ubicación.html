
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Ubicación - JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 flex flex-col items-center">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-sm text-center">
        <div class="text-red-500 text-5xl mb-4"><i class="fa-solid fa-location-dot"></i></div>
        <h2 class="font-black text-2xl mb-2">MI LOCAL</h2>
        <input type="text" id="dir" placeholder="Dirección Exacta" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 text-center">
        <button onclick="guardarUbi()" class="w-full bg-red-500 text-white p-4 rounded-2xl font-bold">GUARDAR UBICACIÓN</button>
        <p class="text-[10px] text-gray-400 mt-6 uppercase font-bold tracking-widest text-center">Esto aparecerá en el recibo del cliente</p>
    </div>
    <script type="module">
        import { db } from "../config/firebase-config.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        window.guardarUbi = async () => {
            const d = document.getElementById('dir').value;
            await setDoc(doc(db, "config_local", "ubicacion"), { direccion: d }, { merge: true });
            alert("Ubicación guardada.");
        }
    </script>
</body>
</html>
