<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Pedido - JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-orange-600 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl overflow-hidden">
        <div class="bg-black p-8 text-center text-white">
            <h1 class="text-3xl font-black italic">JADI-FOOD</h1>
            <p class="text-[10px] uppercase tracking-widest opacity-60">Comprobante Digital</p>
        </div>
        <div class="p-8 text-center">
            <div id="qrcode" class="bg-gray-100 w-48 h-48 mx-auto mb-6 rounded-3xl flex items-center justify-center border-4 border-dashed border-gray-200 text-gray-400 italic">
                Cargando QR...
            </div>
            <h2 id="cliente-nombre" class="text-2xl font-black text-gray-900 uppercase">GRACIAS POR TU COMPRA</h2>
            <div class="my-6 border-y border-gray-100 py-4">
                <p class="text-xs text-gray-400 font-bold uppercase">Total Pagado</p>
                <p id="monto-final" class="text-5xl font-black text-orange-600">$ 0.00</p>
            </div>
            <p id="local-info" class="text-xs font-bold text-gray-500 italic mb-6"></p>
            <button class="w-full bg-green-500 text-white p-4 rounded-2xl font-black flex items-center justify-center gap-2">
                <i class="fa-brands fa-whatsapp"></i> ¿NECESITAS AYUDA?
            </button>
        </div>
    </div>
    <script type="module">
        const params = new URLSearchParams(window.location.search);
        document.getElementById('monto-final').innerText = `$ ${params.get('total') || '0.00'}`;
        document.getElementById('cliente-nombre').innerText = params.get('cliente') || '¡HOLA!';
    </script>
</body>
</html>
