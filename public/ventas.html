<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Ventas - JADI-FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 p-4">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-orange-600 italic">JADI-FOOD</h2>
            <span class="bg-orange-200 text-orange-800 px-3 py-1 rounded-full text-xs font-bold">Ventas Activas</span>
        </div>

        <div class="grid grid-cols-2 gap-4" id="menu-ventas">
            </div>

        <div class="mt-8 bg-white p-6 rounded-3xl shadow-xl">
            <h3 class="font-bold border-b pb-2 mb-4 italic">TOTAL DEL PEDIDO</h3>
            <div class="flex justify-between text-2xl font-black">
                <span>Total:</span>
                <span id="total-pedido">$ 0.00</span>
            </div>
            <button onclick="confirmarVenta()" class="w-full bg-black text-white p-5 rounded-2xl font-bold mt-6 shadow-lg active:scale-95 transition-all">
                CONFIRMAR VENTA 🛒
            </button>
        </div>
    </div>

    <script type="module">
        import { db } from "../config/firebase-config.js";
        import { collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let total = 0;

        async function cargarMenu() {
            const querySnapshot = await getDocs(collection(db, "platos"));
            const menu = document.getElementById('menu-ventas');
            querySnapshot.forEach((doc) => {
                const p = doc.data();
                const card = document.createElement('button');
                card.className = "bg-white p-4 rounded-2xl shadow-sm text-left border-b-4 border-orange-200";
                card.innerHTML = `<p class="font-bold text-gray-800">${p.nombre}</p><p class="text-orange-600 font-black">$${p.precio}</p>`;
                card.onclick = () => {
                    total += parseFloat(p.precio);
                    document.getElementById('total-pedido').innerText = `$ ${total.toFixed(2)}`;
                };
                menu.appendChild(card);
            });
        }
        cargarMenu();
    </script>
</body>
</html>
